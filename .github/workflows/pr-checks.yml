name: PR Status Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  pr-checks:
    name: PR Quality Gates
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false

      - name: Check for merge conflicts
        run: |
          git merge-tree $(git merge-base HEAD main) HEAD main | grep -q "^@@" && echo "::error::This PR has merge conflicts that must be resolved" && exit 1 || echo "No merge conflicts detected"

      - name: Run comprehensive tests
        run: |
          echo "Running test suite..."
          npm test
          echo "✅ All tests passed"

      - name: Verify test coverage
        run: |
          echo "Checking test coverage requirements..."
          npm run test:coverage
          echo "✅ Coverage requirements met"

      - name: Check build integrity
        run: |
          echo "Verifying build process..."
          npm run build
          echo "✅ Build completed successfully"

      - name: Size impact analysis
        uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: "./dist/**/*.{js,css,html}"
          strip-hash: "\\.(\\w{8})\\."

      - name: PR Summary Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read test results if coverage file exists
            let coverageInfo = '';
            try {
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
              const total = coverage.total;
              coverageInfo = `
            ## 📊 Test Coverage Report
            | Metric | Coverage | Threshold |
            |--------|----------|-----------|
            | Lines | ${total.lines.pct}% | 70% |
            | Functions | ${total.functions.pct}% | 70% |
            | Branches | ${total.branches.pct}% | 70% |
            | Statements | ${total.statements.pct}% | 70% |
            `;
            } catch (e) {
              coverageInfo = '📊 Coverage report will be available after tests complete.';
            }

            const comment = `
            ## 🚀 PR Quality Check Results

            ✅ **All automated checks passed!** This PR is ready for review.

            ${coverageInfo}

            ## 📋 What was verified:
            - [x] All tests pass
            - [x] Coverage thresholds met (70%+)
            - [x] Build completes successfully
            - [x] No merge conflicts
            - [x] Bundle size impact analyzed

            ---
            🤖 *This comment is automatically updated when new commits are pushed.*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  require-status-checks:
    name: Require Status Checks
    runs-on: ubuntu-latest
    needs: [pr-checks]
    if: always()

    steps:
      - name: Check required status
        run: |
          if [[ "${{ needs.pr-checks.result }}" != "success" ]]; then
            echo "::error::Required PR checks failed. Please fix issues before merging."
            exit 1
          fi
          echo "✅ All required checks passed - PR is ready for merge"

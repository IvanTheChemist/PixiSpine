name: ✨ Feature Request
description: Suggest a new feature or enhancement for the PixiJS Spine demo
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees:
  - IvanTheChemist

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please fill out the form below to help us understand your request.

  - type: textarea
    id: summary
    attributes:
      label: 💡 Feature Summary
      description: A clear and concise description of the feature you'd like to see
      placeholder: Briefly describe the feature...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🎯 Problem Statement
      description: What problem does this feature solve? What use case does it address?
      placeholder: |
        Is your feature request related to a problem? Please describe.
        A clear and concise description of what the problem is.
        Example: "I'm always frustrated when [...]"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💭 Proposed Solution
      description: Describe the solution you'd like to see implemented
      placeholder: |
        A clear and concise description of what you want to happen.
        How should this feature work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: |
        A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 📊 Priority Level
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would be helpful
        - High - Important for my use case
        - Critical - Blocking my work
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: ⚡ Implementation Complexity (Your Estimate)
      description: How complex do you think this feature would be to implement?
      options:
        - Simple - Minor change or addition
        - Medium - Moderate development effort
        - Complex - Significant changes required
        - Not sure
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: 🎨 Mockups/Examples
      description: If applicable, add mockups, wireframes, or examples from other applications
      placeholder: Drag and drop images here or paste URLs...

  - type: textarea
    id: technical-details
    attributes:
      label: 🔧 Technical Details
      description: Any technical implementation details or constraints to consider
      placeholder: |
        - API considerations
        - Performance implications  
        - Browser compatibility
        - Dependencies required
        - etc.

  - type: textarea
    id: additional-context
    attributes:
      label: 📋 Additional Context
      description: Add any other context or information about the feature request
      placeholder: Any additional information that might be helpful...

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues and feature requests to make sure this is not a duplicate
          required: true
        - label: I have provided all the information requested above
          required: true
        - label: I would be willing to help implement this feature (if I have the technical skills)
          required: false
        - label: I would be willing to help test this feature once implemented
          required: false
